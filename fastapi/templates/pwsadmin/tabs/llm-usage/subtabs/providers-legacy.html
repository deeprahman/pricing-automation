      <div id="llm-provider-settings-panel" class="rounded border p-3">
        <div class="flex flex-wrap items-end gap-2 text-sm">
          <label class="block">
            <span class="block text-xs font-semibold text-slate-600 dark:text-slate-300">LLM Provider</span>
            <select id="llm-provider-settings-select" class="control-surface w-48 rounded border px-2 py-1"></select>
          </label>
          <label class="block min-w-[240px] flex-1">
            <span class="block text-xs font-semibold text-slate-600 dark:text-slate-300">API Key</span>
            <input id="llm-provider-api-key" type="password" class="control-surface w-full rounded border px-2 py-1" placeholder="Enter API key" />
          </label>
          <button id="llm-provider-api-key-save" class="rounded bg-brand-600 px-3 py-1 text-white">Save API Key</button>
        </div>
        <div class="mt-3 flex flex-wrap items-end gap-2 text-sm">
          <label class="block min-w-[240px] flex-1">
            <span class="block text-xs font-semibold text-slate-600 dark:text-slate-300">Selected Model</span>
            <select id="llm-provider-model" class="control-surface w-full rounded border px-2 py-1"></select>
          </label>
          <label class="block min-w-[240px] flex-1">
            <span class="block text-xs font-semibold text-slate-600 dark:text-slate-300">Custom Model</span>
            <input id="llm-provider-model-custom" class="control-surface w-full rounded border px-2 py-1" placeholder="Optional model name" />
          </label>
          <label class="block">
            <span class="block text-xs font-semibold text-slate-600 dark:text-slate-300">Timeout Seconds</span>
            <input id="llm-provider-timeout" type="number" min="1" max="600" class="control-surface w-32 rounded border px-2 py-1" />
          </label>
          <label class="inline-flex items-center gap-2 pb-1">
            <input id="llm-provider-enabled" type="checkbox" class="rounded border" />
            <span>Enabled</span>
          </label>
          <button id="llm-provider-health-check" class="secondary-btn rounded border px-3 py-1">Check Provider</button>
          <button id="llm-provider-settings-save" class="rounded bg-brand-600 px-3 py-1 text-white">Save Provider Settings</button>
        </div>
        <p id="llm-provider-settings-status" class="mt-2 text-xs text-slate-600 dark:text-slate-300"></p>
      </div>
